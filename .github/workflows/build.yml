name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: windows-latest
            name: windows-x64
          - os: macos-latest
            name: macos-universal
            cmake_flags: -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev pkg-config

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DVAPE_COPY_PLUGIN=OFF ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release --target VapeStation_VST3 RenderTest --parallel

      # Upload before testing so the binary survives a failing check.
      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: VapeStation-${{ matrix.name }}-vst3
          path: build/VapeStation_artefacts/Release/VST3/VapeStation.vst3

      - name: RenderTest
        shell: bash
        run: ./build/RenderTest_artefacts/Release/RenderTest rt-out

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendertest-output-${{ matrix.name }}
          path: rt-out

  # One cross-platform bundle per the VST3 spec: the three platform builds
  # overlay cleanly because each contributes its own Contents/<arch>/ dir
  # (plus Info.plist/PkgInfo from macOS); Resources/ is identical everywhere.
  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download platform bundles
        uses: actions/download-artifact@v4
        with:
          pattern: VapeStation-*-vst3
          merge-multiple: true
          path: VapeStation.vst3

      - name: Verify merged layout
        run: |
          test -f "VapeStation.vst3/Contents/x86_64-win/VapeStation.vst3"
          test -f "VapeStation.vst3/Contents/x86_64-linux/VapeStation.so"
          test -f "VapeStation.vst3/Contents/MacOS/VapeStation"
          test -f "VapeStation.vst3/Contents/Info.plist"
          find VapeStation.vst3 -type f | sort

      # Tar (not zip) so the macOS binary keeps its executable bit.
      - name: Pack
        run: |
          chmod +x VapeStation.vst3/Contents/MacOS/VapeStation
          tar czf VapeStation-all-platforms.vst3.tar.gz VapeStation.vst3

      - name: Upload merged bundle
        uses: actions/upload-artifact@v4
        with:
          name: VapeStation-all-platforms-vst3
          path: VapeStation-all-platforms.vst3.tar.gz

  # Pushing a v* tag publishes a GitHub Release with all the bundles attached.
  release:
    needs: [build, merge]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: VapeStation-*-vst3
          path: artifacts

      # Zip each per-platform bundle ourselves (Info-ZIP keeps unix perms,
      # unlike artifact zips); the merged bundle is already a perm-safe tar.
      - name: Package
        run: |
          cd artifacts
          chmod +x VapeStation-macos-universal-vst3/Contents/MacOS/VapeStation
          for p in linux-x64 windows-x64 macos-universal; do
            mkdir -p "pkg/$p/VapeStation.vst3"
            cp -r "VapeStation-$p-vst3/." "pkg/$p/VapeStation.vst3/"
            (cd "pkg/$p" && zip -qr "../../VapeStation-$GITHUB_REF_NAME-$p.vst3.zip" VapeStation.vst3)
          done
          cp VapeStation-all-platforms-vst3/VapeStation-all-platforms.vst3.tar.gz \
             "VapeStation-$GITHUB_REF_NAME-all-platforms.vst3.tar.gz"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/VapeStation-"$GITHUB_REF_NAME"-*.vst3.zip \
            artifacts/VapeStation-"$GITHUB_REF_NAME"-all-platforms.vst3.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "VapeStation $GITHUB_REF_NAME" \
            --generate-notes
